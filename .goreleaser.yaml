# GoReleaser config — https://goreleaser.com
# Run `goreleaser release --snapshot --clean` locally to test without publishing.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kazi
    main: ./cmd/kazi
    binary: kazi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: kazi
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug fixes
      regexp: '^fix'
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto

# Homebrew tap — publishes a cask to github.com/thapakazi/homebrew-kazi
# so users can `brew install thapakazi/kazi/kazi` (or tap first, then install).
# GoReleaser generates on_macos/on_linux blocks, so the cask covers both.
homebrew_casks:
  - name: kazi
    repository:
      owner: thapakazi
      name: homebrew-kazi
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://thapakazi.github.io/kazi"
    description: "The control plane for your local containers"
    # kazi shells out to a container runtime's compose CLI; Docker is first-class.
    caveats: |
      kazi needs a container runtime with compose support on your PATH
      (Docker is first-class; podman and nerdctl are auto-detected).
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    # Strip the macOS quarantine bit so the binary runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kazi"]
          end
    # Skip publishing for prereleases / snapshots.
    skip_upload: auto
